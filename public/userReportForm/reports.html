<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Report</title>
    <link rel="stylesheet" href="reports.css" />
    <!-- Google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <!-- Bootstrap css CDN links -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Navbar -->
    <div class="navbar navbar-expand-lg nav fixed-top">
      <div class="container-fluid">
        <div class="navbar-brand">Our Logo or Name</div>
        <div class="collapse navbar-collapse" id="navbarNav"></div>
      </div>
    </div>

    <div class="form-map">
      <div class="form">
        <form id="reportForm">
          <div class="mb-3">
            <label for="name" class="form-label">Name</label>
            <input id="name" name="name" class="form-control" type="text" />
          </div>

          <div class="mb-3">
            <label for="phone" class="form-label">Phone</label>
            <input id="phone" name="phone" class="form-control" type="number" />
          </div>

          <div class="mb-3">
            <label for="location" class="form-label">Location</label>
            <input id="location" class="form-control" type="text" />
          </div>

          <div class="mb-3">
            <label for="images" class="form-label">Upload Images</label>
            <input
              id="images"
              name="image"
              class="form-control file-upload"
              type="file"
            />
          </div>

          <div class="mb-3">
            <label for="description" class="form-label">Description</label>
            <input
              id="description"
              name="description"
              class="form-control"
              type="text"
            />
          </div>

          <div class="mb-3 button">
            <button type="submit" class="btn">SOS</button>
          </div>
        </form>

        <div class="analyze-element">
          <p><strong>Analyzing with AI . . .</strong></p>

          <div class="progress w-75 mb-3">
            <div
              id="progressBar"
              class="progress-bar progress-bar-striped progress-bar-animated bg-danger"
              style="width: 0%"
            ></div>
          </div>

          <!-- Percentage -->
          <p id="progressText">0%</p>
          <!-- <p>High Severity</p>
          <p>Immediate Attention Required</p> -->
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="reports.js"></script>
  </body>
</html>
