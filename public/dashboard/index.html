<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <!-- Google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <!-- Bootstrap css CDN links -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./index.css" />

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  </head>
  <body>
    <!-- Navbar -->
    <div class="navbar navbar-expand-lg nav fixed-top glass-nav">
      <div class="container-fluid">
        <div class="navbar-brand">Our Logo or Name</div>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <div class="navbar-nav ms-auto">
            <a class="nav-link" href="#">Emergency Dispatch</a>
            <a class="nav-link reports-panel" href="#">Reports Panel</a>
            <a class="nav-link" href="#">Log In</a>
          </div>
        </div>
      </div>
    </div>

    <!-- Map -->
    <div id="map"></div>

    <!-- Side Panel -->
    <div id="sidePanel" class="side-panel">
      <h5 class="list-group">Reports</h5>
      <div class="list-group reports-list">
        <!-- <button class="list-group-item list-group-item-action">
          Accident - High
        </button>-->
        <button class="list-group-item list-group-item-action">
          <!-- <p>Location:</p>
          <p class="list-group-description">
            Description goes here describing the incident
          </p> -->
        </button>
      </div>
    </div>

    <!-- Incident Card -->
    <div class="card incident-card" style="width: 18rem" id="incidentCard">
      <div class="d-flex justify-content-between align-items-start">
        <p class="card-text report-id mb-0">Report ID: 1187dnfi2</p>
        <button class="btn-close" onclick="closeCard()"></button>
      </div>

      <div class="incident-card-images">
        <img src="..." class="card-img-top incident-img" alt="..." />
        <!-- <img src="..." class="card-img-top incident-img" alt="..." />
        <img src="..." class="card-img-top incident-img" alt="..." /> -->
      </div>

      <div class="card-body">
        <p class="card-text desc">Description: Accident on highway</p>
        <p class="card-text location">Location: Pune-Mumbai Expressway</p>
        <p class="card-text">
          Severity: <span class="badge bg-danger severity">High</span>
        </p>
        <p class="card-text ai-desc">AI Description: Accident on highway</p>
        <p class="card-text time">Time: 2 mins ago</p>

        <button class="btn blockchain-btn" onclick="storeBlockchain()">
          Store on Blockchain
        </button>
      </div>
    </div>

    <!-- leaflet js -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./index.js"></script>
  </body>
</html>
